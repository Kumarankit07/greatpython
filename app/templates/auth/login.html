{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div style="min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div style="width:100%;max-width:440px;">
    <div class="text-center mb-3">
      <div style="font-size:3rem;margin-bottom:0.5rem;">🧠</div>
      <h1 style="font-family:'Outfit',sans-serif;font-size:1.8rem;font-weight:800;">Welcome Back</h1>
      <p class="text-muted mt-1">Login to NeuroCare AI Platform</p>
    </div>

    <div class="card animate-fade-up">
      <!-- ROLE SELECTOR -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1.5rem;" id="roleSelector">
        <label class="role-btn active" id="role-patient-btn" onclick="setRole('patient')" style="cursor:pointer;text-align:center;padding:1rem;border-radius:var(--radius-sm);border:2px solid var(--accent);background:rgba(59,130,246,0.1);transition:var(--transition);">
          <div style="font-size:1.5rem;margin-bottom:0.3rem;">🧑</div>
          <div style="font-weight:700;font-size:0.9rem;">Patient</div>
        </label>
        <label class="role-btn" id="role-asha-btn" onclick="setRole('asha')" style="cursor:pointer;text-align:center;padding:1rem;border-radius:var(--radius-sm);border:2px solid var(--border);background:transparent;transition:var(--transition);">
          <div style="font-size:1.5rem;margin-bottom:0.3rem;">👩‍⚕️</div>
          <div style="font-weight:700;font-size:0.9rem;">ASHA Worker</div>
        </label>
      </div>

      <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm">
        <input type="hidden" name="role" id="roleInput" value="patient"/>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required id="email"/>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required id="password"/>
        </div>

        <div class="d-flex align-center justify-between mb-2" style="font-size:0.85rem;">
          <label style="display:flex;align-items:center;gap:6px;color:var(--text-muted);cursor:pointer;">
            <input type="checkbox" name="remember" style="accent-color:var(--accent)"/> Remember me
          </label>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
          🔑 Login
        </button>
      </form>

      <hr class="divider"/>
      <div class="text-center" style="font-size:0.88rem;color:var(--text-muted);">
        Don't have an account? <a href="{{ url_for('auth.register') }}" style="color:var(--accent);">Register here</a>
      </div>

      <!-- DEMO CREDENTIALS -->
      <div class="alert alert-info mt-2" style="font-size:0.82rem;">
        <span>ℹ️</span>
        <div>
          <strong>Demo accounts:</strong><br/>
          Patient: <code>patient@demo.com</code> / <code>patient1234</code><br/>
          ASHA: <code>asha@demo.com</code> / <code>asha1234</code>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function setRole(role) {
  document.getElementById('roleInput').value = role;
  ['patient','asha'].forEach(r => {
    const btn = document.getElementById('role-'+r+'-btn');
    if(r === role) {
      btn.style.border = '2px solid var(--accent)';
      btn.style.background = 'rgba(59,130,246,0.1)';
    } else {
      btn.style.border = '2px solid var(--border)';
      btn.style.background = 'transparent';
    }
  });
}
</script>
{% endblock %}
