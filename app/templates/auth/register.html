{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div style="min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div style="width:100%;max-width:520px;">
    <div class="text-center mb-3">
      <div style="font-size:3rem;margin-bottom:0.5rem;">🏥</div>
      <h1 style="font-family:'Outfit',sans-serif;font-size:1.8rem;font-weight:800;">Create Account</h1>
      <p class="text-muted mt-1">Join NeuroCare AI — Rural Health Platform</p>
    </div>

    <div class="card animate-fade-up">
      <!-- ROLE SELECTOR -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1.5rem;">
        <label id="reg-patient-btn" onclick="setRegRole('patient')" style="cursor:pointer;text-align:center;padding:1rem;border-radius:var(--radius-sm);border:2px solid var(--accent);background:rgba(59,130,246,0.1);transition:all 0.3s;">
          <div style="font-size:1.5rem;margin-bottom:0.3rem;">🧑</div>
          <div style="font-weight:700;font-size:0.9rem;">Patient</div>
          <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.2rem;">Track your symptoms</div>
        </label>
        <label id="reg-asha-btn" onclick="setRegRole('asha')" style="cursor:pointer;text-align:center;padding:1rem;border-radius:var(--radius-sm);border:2px solid var(--border);background:transparent;transition:all 0.3s;">
          <div style="font-size:1.5rem;margin-bottom:0.3rem;">👩‍⚕️</div>
          <div style="font-weight:700;font-size:0.9rem;">ASHA Worker</div>
          <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.2rem;">Screen community patients</div>
        </label>
      </div>

      <form method="POST" action="{{ url_for('auth.register') }}">
        <input type="hidden" name="role" id="regRoleInput" value="patient"/>

        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Full Name *</label>
            <input type="text" name="name" class="form-control" placeholder="Rajesh Kumar" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="tel" name="phone" class="form-control" placeholder="9876543210"/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address *</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Password *</label>
            <input type="password" name="password" class="form-control" placeholder="Min 6 chars" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password *</label>
            <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required/>
          </div>
        </div>

        <hr class="divider"/>
        <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:0.75rem;">📍 Location (optional but recommended)</p>

        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Village / Town</label>
            <input type="text" name="village" class="form-control" placeholder="Rampur"/>
          </div>
          <div class="form-group">
            <label class="form-label">District</label>
            <input type="text" name="district" class="form-control" placeholder="Varanasi"/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">State</label>
          <select name="state" class="form-control">
            {% for s in ['Uttar Pradesh','Bihar','Rajasthan','Madhya Pradesh','Jharkhand','Odisha','West Bengal','Assam','Chhattisgarh','Maharashtra'] %}
              <option>{{ s }}</option>
            {% endfor %}
          </select>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem;">
          🚀 Create Account
        </button>
      </form>

      <hr class="divider"/>
      <div class="text-center" style="font-size:0.88rem;color:var(--text-muted);">
        Already have an account? <a href="{{ url_for('auth.login') }}" style="color:var(--accent);">Login here</a>
      </div>
    </div>
  </div>
</div>

<script>
function setRegRole(role) {
  document.getElementById('regRoleInput').value = role;
  ['patient','asha'].forEach(r => {
    const btn = document.getElementById('reg-'+r+'-btn');
    if(r === role) {
      btn.style.border = '2px solid var(--accent)';
      btn.style.background = 'rgba(59,130,246,0.1)';
    } else {
      btn.style.border = '2px solid var(--border)';
      btn.style.background = 'transparent';
    }
  });
}
const urlRole = new URLSearchParams(window.location.search).get('role');
if(urlRole) setRegRole(urlRole);
</script>
{% endblock %}
